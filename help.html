<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Help & Documentation - EPA FRN Approval System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/shared.css">
    <style>
        :root { --navy:#002147; --gold:#b8860b; --burgundy:#800020; --cream:#faf8f3; --parchment:#f4f1e8; --light-gray:#e0e0e0; --gray:#666; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Source Serif 4', serif; background:var(--cream); color:var(--navy); }
        .content-wrapper { display:flex; flex:1; margin-left:285px; width:calc(100vw - 285px); min-height:100vh; }
        .main-content { flex:1; padding:0 0.25rem; }
        .container { max-width:1260px; margin:0 auto; padding:0.3rem 1rem 3rem; }
        header { background:white; border:3px solid var(--navy); border-top:8px solid var(--gold); padding:1.2rem 1rem; margin-bottom:1.5rem; display:flex; align-items:center; gap:1.2rem; }
        .header-seal { width:110px; height:110px; background:linear-gradient(135deg,var(--navy),var(--burgundy)); border-radius:50%; border:4px solid var(--gold); display:flex; align-items:center; justify-content:center; font-size:3rem; color:white; flex-shrink:0; }
        .department { font-size:1.2rem; color:var(--gold); text-transform:uppercase; letter-spacing:0.15em; font-weight:700; margin-bottom:0.35rem; }
        h1 { font-family:'Libre Baskerville', serif; font-size:2.4rem; color:var(--navy); font-weight:700; margin-bottom:0.25rem; }
        .tagline { font-size:1.1rem; color:var(--burgundy); font-weight:800; }
        .placeholder-box { background:white; border:2px solid var(--navy); border-left:6px solid var(--gold); padding:3rem 2rem; text-align:center; }
        .placeholder-box h2 { font-family:'Libre Baskerville', serif; font-size:1.8rem; margin-bottom:1rem; }
        .placeholder-box p { color:var(--gray); font-size:1rem; max-width:500px; margin:0 auto; }
        .badge { display:inline-block; background:#f57c00; color:white; font-size:0.75rem; padding:0.3rem 0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; margin-top:1.5rem; }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <div class="main-content">
            <div class="container">
                <header>
                    <div class="header-seal">❓</div>
                    <div>
                        <div class="department">Environmental Protection Agency</div>
                        <h1>Federal Register Notice (FRN) Approval Workflow</h1>
                        <div class="tagline">Help & Documentation</div>
                    </div>
                </header>
                <div class="placeholder-box">
                    <h2>Help & Documentation</h2>
                    <p>Access user guides, training materials, and support resources for the FRN Approval System.</p>
                    <div class="badge">Coming Soon</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
